<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jack — Innovation &amp; Creativity Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-mark">ICL</div>
          <div class="brand-text">
            <span class="brand-name">Jack</span>
            <span class="brand-sub">Innovation &amp; Creativity Lab<span class="brand-college"> · Gettysburg College</span></span>
          </div>
        </div>
        <div class="header-right">
          <button class="new-chat-btn" id="newChatBtn" type="button">+ New Chat</button>
          <div class="header-status">
            <span class="status-dot"></span>
            <span>Online 24/7</span>
          </div>
        </div>
      </div>
    </header>

    <div class="app">

      <!-- Sidebar -->
      <aside class="sidebar">
        <p class="sidebar-label">Equipment</p>
        <div class="machine-list">

          <button class="machine-item" data-prompt="How do I 3D print something at the ICL?">
            <div class="machine-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 7h10M7 11h6"/></svg>
            </div>
            <div class="machine-info">
              <strong>3D Printing</strong>
              <span>Ender 3 V3 KE</span>
            </div>
          </button>

        </div>

        <div class="sidebar-footer">
          <a href="mailto:icl@gettysburg.edu">icl@gettysburg.edu</a>
        </div>
      </aside>

      <!-- Main chat area -->
      <main class="chat-area">

        <div class="chat-thread" id="chatThread">
          <!-- Welcome state -->
          <div class="welcome" id="welcomeSection">
            <div class="welcome-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <h2>How can I help you make something?</h2>
            <p>Ask me anything about the lab equipment — I'll guide you step by step.</p>
            <div class="welcome-suggestions">
              <button class="suggestion-pill" data-prompt="What equipment does the ICL have?">What's in the lab?</button>
              <button class="suggestion-pill" data-prompt="I want to make something but I don't know where to start.">I don't know where to start</button>
              <button class="suggestion-pill" data-prompt="How do I 3D print something?">How does 3D printing work?</button>
              <button class="suggestion-pill" data-prompt="What are the safety rules in the lab?">Safety rules</button>
            </div>
          </div>
        </div>

        <div class="input-area">
          <div class="loading" id="loading" hidden>
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <span>Thinking...</span>
          </div>
          <div class="input-row">
            <textarea
              id="questionInput"
              placeholder="Ask about any lab equipment..."
              rows="1"
              autocomplete="off"
            ></textarea>
            <button class="mic-btn" id="micBtn" type="button" title="Voice input">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <button class="send-btn" id="askBtn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
          <p class="input-hint">Press <kbd>Shift</kbd>+<kbd>Enter</kbd> for a new line</p>
        </div>

      </main>
    </div>

    <script src="client.js"></script>
  </body>
</html>
